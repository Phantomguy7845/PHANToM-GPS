name: Release APKs

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example 0.0.9 or v0.0.9)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            raw_version="${{ github.ref_name }}"
          else
            raw_version="${{ inputs.version }}"
          fi
          echo "version=${raw_version#v}" >> "$GITHUB_ENV"

      - name: Use JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build release APKs
        shell: bash
        run: |
          echo "${{ secrets.STORE }}" | base64 -d > upload.jks
          echo "${{ secrets.LOCAL }}" | base64 -d > local.properties
          chmod +x ./gradlew
          ./gradlew :app:assembleFullRelease :installer:assembleRelease --stacktrace
          rm -f upload.jks local.properties

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: v${{ env.version }}
          tag_name: v${{ env.version }}
          files: |
            app/build/outputs/apk/full/release/app-full-arm64-v8a-release.apk
            installer/build/outputs/apk/release/installer-release.apk
